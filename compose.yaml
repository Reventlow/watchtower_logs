# Deployment compose file for ZimaOS (installed via the ZimaOS API).
# The watchtower labels opt this container into watchtower's own
# --label-enable update cycle, so the dashboard updates itself.
name: watchtower-logs
services:
    watchtower-logs:
        image: ghcr.io/reventlow/watchtower_logs:latest
        restart: unless-stopped
        ports:
            - "8096:8000"
        # __PLACEHOLDER__ values are filled in from .env.deploy (gitignored)
        # by scripts/deploy_zima.py — secrets never live in this file.
        environment:
            HOST_LABEL: zima
            SCAN_INTERVAL_SECONDS: "600"
            NTFY_URL: https://ntfy.blacklog.net
            NTFY_TOPIC: __NTFY_TOPIC__
            # Access control is authentication (password + TOTP, 30-day
            # sessions, API bearer tokens) instead of an IP allowlist.
            ALLOWED_NETWORKS: ""
            AUTH_USERNAME: __AUTH_USERNAME__
            AUTH_PASSWORD_HASH: __AUTH_PASSWORD_HASH__
            TOTP_SECRET: __TOTP_SECRET__
            SESSION_SECRET: __SESSION_SECRET__
            SESSION_DAYS: "30"
            API_TOKENS: __API_TOKENS__
        labels:
            com.centurylinklabs.watchtower.enable: "true"
            icon: https://icon.casaos.io/main/all/watchtower.png
        volumes:
            - type: bind
              source: /var/run/docker.sock
              target: /var/run/docker.sock
              read_only: true
networks:
    default:
        name: watchtower-logs_default
x-casaos:
    author: self
    category: self
    icon: https://icon.casaos.io/main/all/watchtower.png
    title:
        custom: watchtower-logs
        en_us: watchtower-logs
