name: Build and publish Docker image

# Every push to main runs the tests and publishes
# ghcr.io/reventlow/watchtower_logs:latest (+ a sha tag).
# Watchtower on zima picks up :latest automatically.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/reventlow/watchtower_logs

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    # Only publish from main; PRs stop after tests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/Reventlow/watchtower_logs
            org.opencontainers.image.description=LAN-only dashboard for watchtower container logs
          cache-from: type=gha
          cache-to: type=gha,mode=max
